name: Qlty Analysis

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  qlty:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Qlty Analysis
        uses: qltysh/qlty-action@main
        with:
          token: ${{ secrets.QLTY_TOKEN }}
