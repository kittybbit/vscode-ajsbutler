---
name: Verify

"on":
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      docs: ${{ steps.filter.outputs.docs }}
      non_docs: ${{ steps.filter.outputs.non_docs }}
    steps:
      - uses: actions/checkout@v4

      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            docs:
              - 'docs/**'
              - 'README.md'
              - '.github/**/*.md'
            non_docs:
              - '**'
              - '!docs/**'
              - '!README.md'
              - '!.github/**/*.md'

  decide:
    needs: changes
    runs-on: ubuntu-latest
    outputs:
      should_verify: ${{ steps.decide.outputs.should_verify }}
    steps:
      - id: decide
        uses: actions/github-script@v7
        with:
          script: |
            const docsChanged =
              "${{ needs.changes.outputs.docs }}" === "true";
            const nonDocsChanged =
              "${{ needs.changes.outputs.non_docs }}" === "true";
            const docsOnly = docsChanged && !nonDocsChanged;

            if (docsOnly) {
              core.setOutput("should_verify", "false");
              return;
            }

            const isFeatureBranch = (ref) =>
              ref.startsWith("feat/") ||
              ref.startsWith("feature/") ||
              ref.startsWith("fix/") ||
              ref.startsWith("chore/") ||
              ref.startsWith("refactor/");

            if (context.eventName === "pull_request") {
              const headRef = context.payload.pull_request?.head?.ref ?? "";
              core.setOutput(
                "should_verify",
                isFeatureBranch(headRef) ? "true" : "false",
              );
              return;
            }

            const branchRef = context.ref.replace("refs/heads/", "");
            core.setOutput(
              "should_verify",
              isFeatureBranch(branchRef) ? "false" : "true",
            );

  verify:
    needs: decide
    if: needs.decide.outputs.should_verify == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: >-
          Markdown lint for docs/specs/features and
          docs/requirements/use-cases
        run: npm run lint:md

      - name: Production build
        run: npm run build

      - name: Desktop extension tests
        run: npm test

      - name: Web extension tests
        run: npm run test:web
