---
name: Verify

"on":
  push:
    branches:
      - "**"
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Markdown lint for docs/specs/features and docs/requirements/use-cases
        run: npm run lint:md

      - name: Production build
        run: npm run build

      - name: Desktop extension tests
        run: npm test

      - name: Web extension tests
        run: npm run test:web
