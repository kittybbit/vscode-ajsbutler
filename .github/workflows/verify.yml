---
name: Verify

"on":
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  decide:
    runs-on: ubuntu-latest
    outputs:
      should_verify: ${{ steps.decide.outputs.should_verify }}
    steps:
      - id: decide
        uses: actions/github-script@v7
        with:
          script: |
            const isFeatureBranch = (ref) =>
              ref.startsWith("feat/") ||
              ref.startsWith("feature/") ||
              ref.startsWith("fix/") ||
              ref.startsWith("chore/");

            if (context.eventName === "pull_request") {
              const headRef = context.payload.pull_request?.head?.ref ?? "";
              core.setOutput(
                "should_verify",
                isFeatureBranch(headRef) ? "true" : "false",
              );
              return;
            }

            const branchRef = context.ref.replace("refs/heads/", "");
            core.setOutput(
              "should_verify",
              isFeatureBranch(branchRef) ? "false" : "true",
            );

  verify:
    needs: decide
    if: needs.decide.outputs.should_verify == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Markdown lint for docs/specs/features and docs/requirements/use-cases
        run: npm run lint:md

      - name: Production build
        run: npm run build

      - name: Desktop extension tests
        run: npm test

      - name: Web extension tests
        run: npm run test:web
