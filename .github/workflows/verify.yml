---
name: Verify

"on":
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      docs_only: ${{ steps.classify.outputs.docs_only }}
    steps:
      - id: classify
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const pull_number = context.payload.pull_request.number;
            const docsOnlyPatterns = [
              /^docs\/.+/,
              /^README\.md$/,
              /^\.codex\/.+\.md$/,
              /^\.github\/.+\.md$/,
            ];

            const files = await github.paginate(
              github.rest.pulls.listFiles,
              {
                owner,
                repo,
                pull_number,
                per_page: 100,
              },
              (response) => response.data.map((file) => file.filename),
            );

            const docsOnly =
              files.length > 0 &&
              files.every((filename) =>
                docsOnlyPatterns.some((pattern) => pattern.test(filename)),
              );

            core.info(`changed files: ${JSON.stringify(files)}`);
            core.info(`docs_only=${docsOnly}`);
            core.setOutput("docs_only", String(docsOnly));

  decide:
    needs: changes
    runs-on: ubuntu-latest
    outputs:
      should_verify: ${{ steps.decide.outputs.should_verify }}
    steps:
      - id: decide
        uses: actions/github-script@v7
        with:
          script: |
            const docsOnly =
              "${{ needs.changes.outputs.docs_only }}" === "true";

            core.setOutput("should_verify", docsOnly ? "false" : "true");

  verify:
    needs: decide
    if: needs.decide.outputs.should_verify == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright headless browser
        run: pnpm exec playwright install --with-deps chromium-headless-shell

      - name: >-
          Markdown lint for docs/specs/features and
          docs/requirements/use-cases
        run: pnpm run lint:md

      - name: Production build
        run: pnpm run build

      - name: Desktop extension tests
        run: pnpm test

      - name: Web extension tests
        run: pnpm run test:web
